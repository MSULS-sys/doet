---
# ---------------------------------------------------------------------------
# Group vars – doet_icap
# These are non-secret, site-wide settings for the ESET ICAP server group.
# Secrets (passwords, keys) are always fetched at runtime from Keeper.
# ---------------------------------------------------------------------------

# Connection
ansible_user: sltnadmin
ansible_ssh_private_key_file: ~/.ssh/ansible-key
ansible_become: true
ansible_become_method: sudo

# Network
dns_servers:
  - "10.128.8.3"
  - "10.128.8.4"

ntp_servers:
  - "10.128.8.3"
  - "10.128.8.4"

ntp_fallback: "ntp.ubuntu.com"

# System
timezone: "Europe/Amsterdam"
locale:   "en_US.UTF-8"

# ESET
eset_installer_url: >-
  https://download.liveinstaller.eset.systems/b96dab92-cd6f-1328-c435-5a6319878d9e/epi_lin_live_installer.bin
eset_install_marker: /opt/eset
eset_installer_dest: /tmp/epi_lin_live_installer.bin

# UFW
ufw_allow_ports:
  - { port: "22", proto: "tcp", comment: "SSH" }
