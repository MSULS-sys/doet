---
# =============================================================================
# Job 1 — create-vms.yml
# Provision 4 Ubuntu 24.04 VMs on Nutanix via Prism Central (API).
# Runs on localhost: nutanix.ncp modules act as API clients, no SSH to Nutanix.
# =============================================================================
- name: "Provision Nutanix VMs for Doetinchem ESET ICAP"
  hosts: localhost
  gather_facts: false

  # YAML anchor — shared Nutanix auth block reused by every ncp module call.
  # nutanix_username + nutanix_password are injected by the AWX "Nutanix" Custom Credential.
  # sltnadmin_password_hash is injected by the AWX "SLTN Admin" Custom Credential.
  # All three arrive as extra_vars; no lookup plugin or collection needed.
  vars:
    _ntnx_auth: &ntnx_auth
      nutanix_host:     "{{ nutanix_host }}"
      nutanix_port:     "{{ nutanix_port }}"
      nutanix_username: "{{ nutanix_username }}"
      nutanix_password: "{{ nutanix_password }}"
      validate_certs:   "{{ nutanix_validate_certs }}"

  tasks:

    # ── Resolve Image ext_id ────────────────────────────────────────────────
    # If the user defines 'vm_image_uuid', use it directly and skip the name lookup.
    - name: "Nutanix | Look up image ext_id for '{{ vm_image_name }}'"
      nutanix.ncp.ntnx_images_info:
        <<: *ntnx_auth
        filter: "name eq '{{ vm_image_name }}'"
      register: image_info
      no_log: false
      when: vm_image_uuid is not defined

    - name: "Assert | Image '{{ vm_image_name }}' was found exactly once"
      ansible.builtin.assert:
        that: image_info.response | length == 1
        fail_msg: >-
          Image '{{ vm_image_name }}' not found. It must exist exactly as named in Prism Central.
          Alternatively, define 'vm_image_uuid' to skip this lookup.
      when: vm_image_uuid is not defined

    - name: "Set fact | image_ext_id"
      ansible.builtin.set_fact:
        image_ext_id: "{{ vm_image_uuid | default(image_info.response[0].ext_id) }}"

    # ── Resolve Subnet ext_id ───────────────────────────────────────────────
    # If the user defines 'vm_subnet_uuid', use it directly and skip the name lookup.
    - name: "Nutanix | Look up subnet ext_id for '{{ vm_subnet_name }}'"
      nutanix.ncp.ntnx_subnets_info:
        <<: *ntnx_auth
        filter: "name eq '{{ vm_subnet_name }}'"
      register: subnet_info
      no_log: false
      when: vm_subnet_uuid is not defined

    - name: "Assert | Subnet '{{ vm_subnet_name }}' was found exactly once"
      ansible.builtin.assert:
        that: subnet_info.response | length == 1
        fail_msg: >-
          Subnet '{{ vm_subnet_name }}' not found. It must exist exactly as named in Prism Central.
          Alternatively, define 'vm_subnet_uuid' to skip this lookup.
      when: vm_subnet_uuid is not defined

    - name: "Set fact | subnet_ext_id"
      ansible.builtin.set_fact:
        subnet_ext_id: "{{ vm_subnet_uuid | default(subnet_info.response[0].ext_id) }}"

    # ── Render & Encode cloud-init ──────────────────────────────────────────
    - name: "Render cloud-init for each VM"
      ansible.builtin.set_fact:
        vm_cloud_init_text: >-
          {{
            vm_cloud_init_text | default({}) | combine({
              item.name: lookup('template', 'templates/cloud-init.j2')
            })
          }}
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    # ── Create Nutanix VMs ──────────────────────────────────────────────────
    - name: "Nutanix | Create VM '{{ item.name }}'"
      nutanix.ncp.ntnx_vms:
        <<: *ntnx_auth
        state:       present
        name:        "{{ item.name }}"
        desc:        "ESET ICAP server - SLTN/Doetinchem"
        vcpus:          "{{ vm_num_sockets }}"
        cores_per_vcpu: "{{ vm_cores_per_socket }}"
        memory_gb:      "{{ vm_memory_gb }}"
        cluster:
          uuid: "{{ vm_cluster_uuid | default(omit) }}"
        disks:
          - type: "DISK"
            bus: "SCSI"
            clone_image:
              uuid: "{{ image_ext_id }}"
            size_gb: "{{ vm_os_disk_gb }}"
          - type: "DISK"
            bus: "SCSI"
            size_gb: "{{ vm_data_disk_gb }}"
        networks:
          - is_connected: true
            subnet:
              uuid: "{{ subnet_ext_id }}"
            private_ip: "{{ item.ip_address }}"
        guest_customization:
          type: "cloud_init"
          is_overridable: false
          script: "{{ vm_cloud_init_text[item.name] }}"
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
      register: vm_create_results
      no_log: false

    # ── Insert NGT ISO ─────────────────────────────────────────────────────
    - name: "Nutanix | Insert NGT ISO to VM '{{ item.name }}'"
      nutanix.ncp.ntnx_vms_ngt_insert_iso_v2:
        <<: *ntnx_auth
        ext_id: "{{ vm_create_results.results[ansible_loop.index0].vm_uuid }}"
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
        extended: true

    # ── Wait for Power ON ───────────────────────────────────────────────────
    - name: "Nutanix | Wait for VM '{{ item.name }}' to reach power_state ON"
      nutanix.ncp.ntnx_vms_info:
        <<: *ntnx_auth
        filter: "name eq '{{ item.name }}'"
      register: vm_poll
      until: >-
        vm_poll.response | length > 0 and
        vm_poll.response[0].power_state == 'ON'
      retries: 30
      delay:   20
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: false

    # ── Export Artifacts for AWX ────────────────────────────────────────────
    - name: "set_stats | Export icap_vm_ips for downstream jobs"
      ansible.builtin.set_stats:
        data:
          icap_vm_ips: "{{ vms | map(attribute='ip_address') | list }}"
        per_host: false
