---
# =============================================================================
# Job 1 - create-vms.yml
# Provision 4 Ubuntu 24.04 VMs on Nutanix via Prism Central (API).
# Runs on localhost: nutanix.ncp modules act as API clients, no SSH to Nutanix.
# =============================================================================
- name: "Provision Nutanix VMs for Doetinchem ESET ICAP"
  hosts: localhost
  gather_facts: false

  # YAML anchor - shared Nutanix auth block reused by every ncp module call.
  # nutanix_username + nutanix_password are injected by the AWX "Nutanix" Custom Credential.
  # sltnadmin_password_hash is injected by the AWX "SLTN Admin" Custom Credential.
  # All three arrive as extra_vars; no lookup plugin or collection needed.
  vars:
    _ntnx_auth: &ntnx_auth
      nutanix_host: "{{ nutanix_host }}"
      nutanix_port: "{{ nutanix_port }}"
      nutanix_username: "{{ nutanix_username }}"
      nutanix_password: "{{ nutanix_password }}"
      validate_certs: "{{ nutanix_validate_certs }}"

  pre_tasks:
    - name: "!!! CHECK NUTANIX & ADMIN CREDENTIALS HERE !!!"
      ansible.builtin.debug:
        msg: 
          - "PRISM HOST:  {{ nutanix_host }}"
          - "PRISM USER:  {{ nutanix_username | default('!! EMPTY !!') }}"
          - "ADMIN HASH:  {{ '**** SET ****' if sltnadmin_password_hash is defined else '!! EMPTY !!' }}"
      no_log: false

    - name: "Assert | Credentials MUST exist"
      ansible.builtin.assert:
        that:
          - nutanix_username is defined
          - nutanix_password is defined
          - nutanix_username | length > 0
          - nutanix_password | length > 0
        fail_msg: "FATAL: Nutanix credentials are not defined in AWX!"

  tasks:

    # -- Resolve Image ext_id ------------------------------------------------
    # If the user defines 'vm_image_uuid', use it directly and skip the name lookup.
    - name: "Nutanix | Look up image ext_id for '{{ vm_image_name }}'"
      nutanix.ncp.ntnx_images_info:
        <<: *ntnx_auth
        filter: "name eq '{{ vm_image_name }}'"
      register: image_info
      no_log: false
      when: vm_image_uuid is not defined

    - name: "Assert | Image '{{ vm_image_name }}' was found exactly once"
      ansible.builtin.assert:
        that: image_info.response | length == 1
        fail_msg: >-
          Image '{{ vm_image_name }}' not found. It must exist exactly as named in Prism Central.
          Alternatively, define 'vm_image_uuid' to skip this lookup.
      when: vm_image_uuid is not defined

    - name: "Set fact | image_ext_id"
      ansible.builtin.set_fact:
        image_ext_id: "{{ vm_image_uuid | default(image_info.response[0].ext_id) }}"

    # -- Resolve Subnet ext_id (eth0 - internal) -----------------------------
    # If the user defines 'vm_subnet_uuid', use it directly and skip the name lookup.
    - name: "Nutanix | Look up subnet ext_id for '{{ vm_subnet_name }}'"
      nutanix.ncp.ntnx_subnets_info:
        <<: *ntnx_auth
        filter: "name eq '{{ vm_subnet_name }}'"
      register: subnet_info
      no_log: false
      when: vm_subnet_uuid is not defined

    - name: "Assert | Subnet '{{ vm_subnet_name }}' was found exactly once"
      ansible.builtin.assert:
        that: subnet_info.response | length == 1
        fail_msg: >-
          Subnet '{{ vm_subnet_name }}' not found. It must exist exactly as named in Prism Central.
          Alternatively, define 'vm_subnet_uuid' to skip this lookup.
      when: vm_subnet_uuid is not defined

    - name: "Set fact | subnet_ext_id (eth0)"
      ansible.builtin.set_fact:
        subnet_ext_id: "{{ vm_subnet_uuid | default(subnet_info.response[0].ext_id) }}"

    # -- Resolve Subnet2 ext_id (eth1 - external / internet-facing) ----------
    - name: "Nutanix | Look up subnet2 ext_id for '{{ vm_subnet2_name | default('undefined') }}'"
      nutanix.ncp.ntnx_subnets_info:
        <<: *ntnx_auth
        filter: "name eq '{{ vm_subnet2_name | default('') }}'"
      register: subnet2_info
      no_log: false
      when:
        - (vm_subnet2_uuid is not defined or vm_subnet2_uuid == "")
        - vm_subnet2_name is defined

    - name: "Assert | Subnet2 '{{ vm_subnet2_name | default('undefined') }}' was found exactly once"
      ansible.builtin.assert:
        that: subnet2_info.response | length == 1
        fail_msg: >-
          Subnet '{{ vm_subnet2_name | default('undefined') }}' not found. It must exist exactly as named in Prism Central.
          Alternatively, define 'vm_subnet2_uuid' to skip this lookup.
      when:
        - (vm_subnet2_uuid is not defined or vm_subnet2_uuid == "")
        - vm_subnet2_name is defined

    # -- Set fact | subnet2_ext_id (eth1) ------------------------------------
    - name: "Set fact | subnet2_ext_id (eth1)"
      ansible.builtin.set_fact:
        subnet2_ext_id: "{{ vm_subnet2_uuid if (vm_subnet2_uuid is defined and vm_subnet2_uuid != '') else subnet2_info.response[0].ext_id | default('') }}"
      when:
        - (vm_subnet2_uuid is defined and vm_subnet2_uuid != "") or (vm_subnet2_name is defined)

    # -- Create Nutanix VMs --------------------------------------------------
    - name: "Nutanix | Create VM '{{ item.name }}'"
      nutanix.ncp.ntnx_vms:
        <<: *ntnx_auth
        state: present
        name: "{{ item.name }}"
        desc: "ESET ICAP server - SLTN/Doetinchem"
        vcpus: "{{ vm_num_sockets }}"
        cores_per_vcpu: "{{ vm_cores_per_socket }}"
        memory_gb: "{{ vm_memory_gb }}"
        cluster:
          uuid: "{{ vm_cluster_uuid | default(omit) }}"
        disks:
          - type: "DISK"
            bus: "SCSI"
            clone_image:
              uuid: "{{ image_ext_id }}"
            size_gb: "{{ vm_os_disk_gb }}"
          - type: "DISK"
            bus: "SCSI"
            size_gb: "{{ vm_data_disk_gb }}"
          - type: "CDROM"
            bus: "IDE"
            empty_cdrom: true
        networks: >-
          {{
            [
              {
                'is_connected': true,
                'subnet': {'uuid': subnet_ext_id},
                'private_ip': item.ip_address
              }
            ] + (
              [
                {
                  'is_connected': true,
                  'subnet': {'uuid': subnet2_ext_id | default('')},
                  'private_ip': item.eth1_ip | default('')
                }
              ] if (subnet2_ext_id is defined and subnet2_ext_id != '' and item.eth1_ip is defined) else []
            )
          }}
        guest_customization:
          type: "cloud_init"
          is_overridable: false
          script: "{{ lookup('template', 'templates/cloud-init.j2') }}"
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
      register: vm_create_results
      no_log: false



    # -- Wait for Power ON ---------------------------------------------------
    - name: "Nutanix | Wait for VM '{{ item.name }}' to reach power_state ON"
      nutanix.ncp.ntnx_vms_info:
        <<: *ntnx_auth
        vm_uuid: "{{ vm_create_results.results[loop_idx].response.metadata.uuid }}"
      register: vm_poll
      until: >-
             (vm_poll.response is defined and (vm_poll.response.spec.resources.power_state | default('')) == 'ON') or
             (vm_poll.entities is defined and (vm_poll.entities[0].status.resources.power_state | default('')) == 'ON')
      retries: 40
      delay: 5
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
        index_var: loop_idx
      no_log: false

    # -- Export Artifacts for AWX --------------------------------------------
    - name: "set_stats | Export icap_vm_ips for downstream jobs"
      ansible.builtin.set_stats:
        data:
          icap_vm_ips: "{{ vms | map(attribute='ip_address') | list }}"
        per_host: false
