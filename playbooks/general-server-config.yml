---
# =============================================================================
# Job 2 - general-server-config.yml
# Post-boot OS baseline configuration and baseline configuration.
# Runs over SSH as sltnadmin against the 4 newly created VMs.
# =============================================================================
- name: "General server configuration - Doetinchem ESET ICAP"
  hosts: doet_icap
  gather_facts: true
  become: true

  tasks:
    # -- Wait for SSH / cloud-init to finish ----------------------------------
    - name: "Wait | SSH connection is available (timeout 300s)"
      ansible.builtin.wait_for_connection:
        timeout: 300
        connect_timeout: 10
        sleep: 5

    - name: "Wait | cloud-init finished successfully"
      ansible.builtin.command: cloud-init status --wait
      register: ci_status
      changed_when: false
      failed_when: "'error' in ci_status.stdout"

    # -- Timezone -------------------------------------------------------------
    - name: "Timezone | Ensure timezone is {{ vm_timezone }}"
      community.general.timezone:
        name: "{{ vm_timezone }}"

    # -- NTP Sync -------------------------------------------------------------
    - name: "NTP | Wait until NTPSynchronized == yes (max 60s)"
      ansible.builtin.command: timedatectl show --property=NTPSynchronized --value
      register: ntp_sync
      until: ntp_sync.stdout.strip() == 'yes'
      retries: 12
      delay: 5
      changed_when: false

    # -- Verify Mounts --------------------------------------------------------
    - name: "Mount | Verify /opt/eset is a valid mountpoint"
      ansible.builtin.command: mountpoint -q /opt/eset
      register: eset_mount
      changed_when: false
      failed_when: eset_mount.rc != 0

    # -- APT Tweaks ----------------------------------------------------------
    - name: "APT | Apply force-unsafe-io for faster dpkg"
      ansible.builtin.copy:
        dest: /etc/dpkg/dpkg.cfg.d/force-unsafe-io
        content: "force-unsafe-io"
        mode: "0644"

    - name: "APT | Configure parallel queue mode and retries"
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/99parallel
        content: |
          APT::Acquire::Queue-Mode "access";
          APT::Acquire::Retries 3;
        mode: "0644"

    # -- APT Update & Upgrade -------------------------------------------------
    - name: "APT | Add Fastfetch PPA (not in noble default repos)"
      ansible.builtin.apt_repository:
        repo: ppa:zhangsongcui3371/fastfetch
        state: present
        update_cache: true

    - name: "APT | Install base packages"
      ansible.builtin.apt:
        name:
          - gnupg2
          - glances
          - multitail
          - fastfetch
        state: present
      register: pkg_install

    - name: "APT | Upgrade all packages"
      ansible.builtin.apt:
        upgrade: yes
        autoremove: true
        purge: true

    # -- Nutanix Guest Tools (NGT) -------------------------------------------
    # The nutanix-guest-agent package installs its unit file to a fixed path
    # (/etc/systemd/system/ngt_guest_agent.service), so a direct stat is the
    # most focused and reliable way to detect whether NGT is already installed.
    - name: "NGT | Check if NGT is already installed"
      ansible.builtin.stat:
        path: /etc/systemd/system/ngt_guest_agent.service
      register: ngt_installed

    - name: "NGT | Install NGT from CD-ROM"
      when: not ngt_installed.stat.exists
      block:
        - name: "NGT | Find the NUTANIX_TOOLS device"
          ansible.builtin.command: blkid -L NUTANIX_TOOLS
          register: ngt_device
          changed_when: false
          failed_when: ngt_device.rc != 0

        - name: "NGT | Ensure mount point exists"
          ansible.builtin.file:
            path: /mnt/nutanix_tools
            state: directory
            mode: "0755"

        - name: "NGT | Mount the Nutanix ISO"
          ansible.builtin.mount:
            path: /mnt/nutanix_tools
            src: "{{ ngt_device.stdout.strip() }}"
            fstype: iso9660
            state: mounted

        - name: "NGT | Run the install script"
          ansible.builtin.command: python3 /mnt/nutanix_tools/installer/linux/install_ngt.py --operation install
          register: ngt_install_output
          changed_when: "'Installation successful' in ngt_install_output.stdout"

        - name: "NGT | Unmount and remove from fstab"
          ansible.builtin.mount:
            path: /mnt/nutanix_tools
            state: absent

        - name: "NGT | Remove temporary mount point"
          ansible.builtin.file:
            path: /mnt/nutanix_tools
            state: absent

    - name: "Fastfetch | Create system-wide logo (/etc/sltn.logo)"
      ansible.builtin.copy:
        dest: /etc/sltn.logo
        content: |
          .d8888b.   88    88888888888 888b    888 
          d88P  Y88  888       888     8888b   888
          Y88b.      888       888     88888b  888
          "Y888b.    888       888     888Y88b 888 
             "Y88b.  888       888     888 Y88b888 
               "888  888       888     888  Y88888 
          Y88b  d88  888       888     888   Y8888
          "YY8888P"  88888888  888     888    Y888 
          -------------------  -------------------
        mode: "0644"

    - name: "Fastfetch | Create system-wide config (/etc/fastfetch.config.jsonc)"
      ansible.builtin.copy:
        dest: /etc/fastfetch.config.jsonc
        content: |
          {
            "$schema": "https://github.com/fastfetch-cli/fastfetch/raw/dev/doc/json_schema.json",
            "display": {
              "pipe": false,
              "key": {
                "width": 11,
                "paddingLeft": 0
              }
            },
            "logo": {
              "type": "file",
              "source": "/etc/sltn.logo",
              "padding": {
                "top": 0,
                "left": 0,
                "right": 4
              }
            },
            "modules": [
              "title",
              "separator",
              {
                "type": "custom",
                "key": "PROJECT",
                "format": "SLTN CLOUD LINUX - DOETINCHEM ESET ICAP"
              },
              {
                "type": "custom",
                "key": "PIPELINE",
                "format": "Provisioned via Nutanix + Cloud-Init + AWX"
              },
              {
                "type": "command",
                "key": "DOB",
                "text": "cat /etc/birth-certificate 2>/dev/null"
              },
              "separator",
              "os",
              "host",
              "kernel",
              "localip",
              "uptime",
              "packages",
              "cpu",
              "memory",
              "swap",
              "disk"
            ]
          }

    # -- Enable fastfetch system-wide -----------------------------------------
    # Two lock namespaces:
    #   - Inside tmux/byobu: one run per tmux session (session_id), so the banner
    #     appears when you open Byobu even if fastfetch already ran in a pre-tmux
    #     login shell (which used the SSH-only lock).
    #   - Plain SSH (no tmux/screen): one run per SSH session via SSH_CONNECTION
    #     or SSH_CLIENT.
    # Lock files live in /tmp and are cleared on reboot.
    - name: "Shell | Remove profile.d trigger (prevents double fastfetch)"
      ansible.builtin.file:
        path: /etc/profile.d/fastfetch.sh
        state: absent

    - name: "Shell | Single fastfetch trigger in /etc/bash.bashrc (all interactive shells)"
      ansible.builtin.blockinfile:
        path: /etc/bash.bashrc
        marker: "# {mark} ANSIBLE MANAGED BLOCK: FASTFETCH"
        block: |
          # SLTN Project Dashboard — plain SSH once per login; Byobu/tmux once per tmux session
          if [[ $- == *i* ]] && [ -x /usr/bin/fastfetch ]; then
              _FF_LOCK=""
              if [[ -n "$TMUX" ]] && command -v tmux >/dev/null 2>&1; then
                  _FF_SID="$(tmux display-message -p '#{session_id}' 2>/dev/null)"
                  if [[ -n "$_FF_SID" ]]; then
                      _FF_LOCK="/tmp/.ff_${UID}_tmuxsess_${_FF_SID}"
                  else
                      _FF_LOCK="/tmp/.ff_${UID}_tmux_${TMUX//[\/,]/_}"
                  fi
              elif [[ -n "$STY" ]]; then
                  _FF_LOCK="/tmp/.ff_${UID}_screen_${STY//[.\/]/_}"
              elif [[ -n "$SSH_CONNECTION" || -n "$SSH_CLIENT" ]]; then
                  _FF_KEY="${SSH_CONNECTION:-$SSH_CLIENT}"
                  _FF_KEY="${_FF_KEY// /_}"
                  _FF_LOCK="/tmp/.ff_${UID}_ssh_${_FF_KEY}"
              fi
              if [[ -n "$_FF_LOCK" ]] && [ ! -f "$_FF_LOCK" ]; then
                  touch "$_FF_LOCK" 2>/dev/null
                  NO_COLOR=1 /usr/bin/fastfetch --config /etc/fastfetch.config.jsonc
              fi
          fi

    # -- UFW Firewall ---------------------------------------------------------
    - name: "UFW | Set default incoming policy to deny"
      community.general.ufw:
        default: deny
        direction: incoming

    - name: "UFW | Allow required ports"
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.comment }}"
      loop: "{{ ufw_allow_ports }}"

    - name: "UFW | Enable firewall"
      community.general.ufw:
        state: enabled
