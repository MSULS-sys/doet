---
# =============================================================================
# Job 2 — general-server-config.yml
# Post-boot OS baseline configuration and baseline configuration.
# Runs over SSH as sltnadmin against the 4 newly created VMs.
# =============================================================================
- name: "General server configuration — Doetinchem ESET ICAP"
  hosts: doet_icap
  gather_facts: true
  become: true

  tasks:
    # ── Wait for SSH / cloud-init to finish ──────────────────────────────────
    - name: "Wait | SSH connection is available (timeout 300s)"
      ansible.builtin.wait_for_connection:
        timeout: 300
        connect_timeout: 10
        sleep: 5

    - name: "Wait | cloud-init finished successfully"
      ansible.builtin.command: cloud-init status --wait
      register: ci_status
      changed_when: false
      failed_when: "'error' in ci_status.stdout or ci_status.rc != 0"

    # ── Timezone ─────────────────────────────────────────────────────────────
    - name: "Timezone | Ensure timezone is {{ vm_timezone }}"
      community.general.timezone:
        name: "{{ vm_timezone }}"

    # ── NTP Sync ─────────────────────────────────────────────────────────────
    - name: "NTP | Wait until NTPSynchronized == yes (max 60s)"
      ansible.builtin.command: timedatectl show --property=NTPSynchronized --value
      register: ntp_sync
      until: ntp_sync.stdout.strip() == 'yes'
      retries: 12
      delay: 5
      changed_when: false

    # ── Verify Mounts ────────────────────────────────────────────────────────
    - name: "Mount | Verify /opt/eset is a valid mountpoint"
      ansible.builtin.command: mountpoint -q /opt/eset
      register: eset_mount
      changed_when: false
      failed_when: eset_mount.rc != 0

    # ── APT Tweaks ──────────────────────────────────────────────────────────
    - name: "APT | Apply force-unsafe-io for faster dpkg"
      ansible.builtin.copy:
        dest: /etc/dpkg/dpkg.cfg.d/force-unsafe-io
        content: "force-unsafe-io"
        mode: "0644"

    - name: "APT | Configure parallel queue mode and retries"
      ansible.builtin.copy:
        dest: /etc/apt.conf.d/99parallel
        content: |
          APT::Acquire::Queue-Mode "access";
          APT::Acquire::Retries 3;
        mode: "0644"

    # ── APT Update & Upgrade ─────────────────────────────────────────────────
    - name: "APT | Update package cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    - name: "APT | Upgrade all packages"
      ansible.builtin.apt:
        upgrade: yes
        autoremove: true
        purge: true

    # ── Nutanix Guest Tools (NGT) ───────────────────────────────────────────
    - name: "NGT | Check if NGT is already installed"
      ansible.builtin.stat:
        path: /usr/local/sbin/ngt_cli
      register: ngt_cli

    - name: "NGT | Install NGT from CD-ROM"
      when: not ngt_cli.stat.exists
      block:
        - name: "NGT | Find the NUTANIX_TOOLS device"
          ansible.builtin.command: blkid -L NUTANIX_TOOLS
          register: ngt_device
          changed_when: false
          failed_when: ngt_device.rc != 0

        - name: "NGT | Ensure mount point exists"
          ansible.builtin.file:
            path: /mnt/nutanix_tools
            state: directory
            mode: "0755"

        - name: "NGT | Mount the Nutanix ISO"
          ansible.builtin.mount:
            path: /mnt/nutanix_tools
            src: "{{ ngt_device.stdout.strip() }}"
            fstype: iso9660
            state: mounted

        - name: "NGT | Run the install script"
          ansible.builtin.command: python3 /mnt/nutanix_tools/installer/linux/install_ngt.py --operation install
          register: ngt_install_output
          changed_when: "'Installation successful' in ngt_install_output.stdout"

        - name: "NGT | Unmount and remove from fstab"
          ansible.builtin.mount:
            path: /mnt/nutanix_tools
            state: absent

        - name: "NGT | Remove temporary mount point"
          ansible.builtin.file:
            path: /mnt/nutanix_tools
            state: absent

    # ── Base Packages ────────────────────────────────────────────────────────
    - name: "APT | Install base packages"
      ansible.builtin.apt:
        name:
          - gnupg2
          - glances
          - multitail
          - fastfetch
        state: present
      register: pkg_install

    - name: "Fastfetch | Create system-wide logo (/etc/fastfetch.logo)"
      ansible.builtin.shell: |
        cat <<'EOF' > /etc/fastfetch.logo
        \x1b[97m .d8888b.  888      88888888888 888b    888
        \x1b[97md88P  Y88b 888          888     8888b   888
        \x1b[97mY88b.      888          888     88888b  888
        \x1b[97m "Y888b.   888          888     888Y88b 888
        \x1b[97m    "Y88b. 888          888     888 Y88b888
        \x1b[97m      "888 888          888     888  Y88888
        \x1b[97mY88b  d88P 888          888     888   Y8888
        \x1b[97m "Y8888P"  88888888     888     888    Y888
        \x1b[38;5;208m━━━━━━━━━━━━━━━━━━━\x1b[39m     \x1b[38;5;33m━━━━━━━━━━━━━━━━━━━\x1b[39m\x1b[39m
        EOF
      args:
        executable: /bin/bash

    - name: "Fastfetch | Create system-wide config (/etc/fastfetch.config.jsonc)"
      ansible.builtin.copy:
        dest: /etc/fastfetch.config.jsonc
        content: |
          {
            "$schema": "https://github.com/fastfetch-cli/fastfetch/raw/dev/doc/json_schema.json",
            "logo": {
              "source": "/etc/fastfetch.logo",
              "color": {
                "1": "33",
                "2": "34"
              },
              "padding": {
                "right": 2
              }
            },
            "modules": [
              "title",
              "separator",
              {
                "type": "custom",
                "key": "PROJECT",
                "format": "SLTN CLOUD LINUX - DOETINCHEM ESET ICAP"
              },
              {
                "type": "custom",
                "key": "PIPELINE",
                "format": "Provisioned via Nutanix + Cloud-Init + AWX"
              },
              {
                "type": "command",
                "key": "DOB",
                "text": "cat /etc/birth-certificate 2>/dev/null"
              },
              "separator",
              "os",
              "host",
              "kernel",
              "localip",
              "uptime",
              "packages",
              "cpu",
              "memory",
              "swap",
              "disk",
              "break",
              "colors"
            ]
          }

    # ── Enable fastfetch system-wide ─────────────────────────────────────────
    - name: "Shell | Enable fastfetch on login (/etc/bash.bashrc)"
      ansible.builtin.lineinfile:
        path: /etc/bash.bashrc
        line: "fastfetch --config /etc/fastfetch.config.jsonc"
        create: true
        state: present

    # ── UFW Firewall ─────────────────────────────────────────────────────────
    - name: "UFW | Set default incoming policy to deny"
      community.general.ufw:
        default: deny
        direction: incoming

    - name: "UFW | Allow required ports"
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.comment }}"
      loop: "{{ ufw_allow_ports }}"

    - name: "UFW | Enable firewall"
      community.general.ufw:
        state: enabled
